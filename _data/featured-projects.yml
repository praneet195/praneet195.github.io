
- name: Face Image Quality Estimation
  description:
  - point: Performed a systematic analysis of face image quality evaluators such as SER-FIQ and SDD-FIQA.
  - point: Leveraged specific quality estimation and datasets for a deeper understanding of learning-based quality estimators.
  - point: Employed prevalent distortions in face images to develop superior and more robust face quality estimators.
  - point: Introduced a new, operational evaluation protocol that minimizes the computational complexity of assessing face image quality estimators.

- name: Task Aware Video Encoding using Lightweight Edge-based Neural Networks
  description:
  - point: Devised a task-oriented CU Frame Partitioning procedure for video encoders like HM and VVC.
  - point: Employed lightweight, edge-based neural networks that predict frame partitioning depending on the task to systematically aid the encoder i.e., for region-specific video encoding.
  - point: Achieved bit-rate conservation during transmission and diminished encoding time while ensuring the performance of learning-based analytics remains.

- name: Multi-modal Neural Field Representations: Audio + Video (Pending Patent Approval with Dolby Laboratories)
  description:
  - point: Unifying the representation of audio and video with a singular Neural Field Representation.
  - point: Worked on methods of Model Pruning and Quantization instead of focusing on modality-specific compression.

- name: Understanding the Effects of Video Compression on Computer Vision Applications
  description:
  - point: Investigated the impact of compression on computer vision tasks such as pedestrian detection and face recognition.
  - point: Assessed compression's influence on task performance in a variety of conditions, including differing light, resolution, camera models (e.g., fisheye), camera streams (such as RGB vs IR), facial skin tones, object dimensions, etc.
  - point: Appraised the impact of various encoders and their configurations on task performance.
  
- name: End-to-end evaluation of Practical Video Analytics systems
  description:
    - point: Pre-processing real-world data, eliminating bias in terms of evaluation scenarios to create interpretable results 
    - point: Creating consistent annotations for fair performance evaluation
    - point: Exploring the performance co-dependence that exists between face detection and recognition tasks 
    - point: Using multi-view, multi-modal data to help with end-to-end detection and recognition in different illumination conditions and recording environments

- name: Lightweight Compression of Intermediate Neural Network Features
  description:
    - point: Encoding neural network features using existing vidoe codecs to see if it is a better alternative to encoding images/frames
    - point: Working to understand if neural networks can be split effectively such that intermediate features can be encoded and transmitted
    - point: Finding network splits such that the best balance between saving bit-rate and maintaining task accuracy can be obtained
    - point: Developing Feature-To-Image mapping \& Auto-Encoder architectures for dimensionality reduction of features before encoding
    
- name: Foreground Segmentation for Camera-Trap Images
  description:
    - point: Developed a Robust PCA based saliency predictor that helps with the background-foreground segmentation,identificationand population estimation of fauna in camera-trap images from Senegal
    - point: The RPCA method does not require training and it’s performance is comparable to learning models like R3-Net
    - point: The saliency predictor is used to detect and track animals, estimate population density and regular animal activity patterns
    
- name: EdgeDetect - A framework to detect DDoS attacks on Edge nodes
  description:
    - point: Worked with Dr.   Reshmi Mitra from Southeast Missouri State University in developing a novel framework that helped in detecting DDoS attacks on Edge Devices using Recurrent Neural Networks
    - point: Achieved SOTA performance on the UNSW 2015 dataset while ensuring minimal model architecture i.e can be runon edge devices

- name: Traffic Analytics Architecture and Dataset for Indian Roads using a Monocular Surveillance Camera Network
  description:
    - point: Worked with Dr.  Abhay Sharma and Dr.  Raghu Krishnapuram in developing solutions to help in Traffic Analyticsthat involved tasks like vehicle counting, license-plate detection speed estimation and queue-length estimation
    - point: Built a real-time front-end WebServer System that serves live video streams in RTMP and HLS formats. Implementedthe server with methods for Discovery,Sharing Content,Routing,Congestion and Load Balancing
    - point: The entire framework has been deployed in Electronic City, Bangalore, India
